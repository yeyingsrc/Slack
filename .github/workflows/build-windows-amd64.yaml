name: "Slack for windows amd64"

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Wails environment
        run: wails3 doctor

      - name: Build Wails app on Windows
        run: wails3 build -config ./build/config.yml -platform windows/amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Slack-windows-amd64
          path: build/bin/**
          if-no-files-found: error
