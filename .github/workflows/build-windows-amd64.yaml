name: "Slack for windows amd64"

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Wails environment
        run: wails3 doctor

      - name: Generate bindings
        run: wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=-w -ldflags=-s" -clean=true -ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Windows binary
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o build/bin/Slack.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Slack-windows-amd64
          path: build/bin/Slack.exe
          if-no-files-found: error
