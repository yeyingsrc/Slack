name: "Slack Build"

on:
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-amd64
            runs-on: macos-13
            go-version: "1.25"
            node-version: "20"
            task: darwin:package
            artifact: Slack-macos-amd64
          - name: macos-arm64
            runs-on: macos-14
            go-version: "1.25"
            node-version: "20"
            task: darwin:package
            artifact: Slack-macos-arm64
          - name: windows-amd64
            runs-on: windows-latest
            go-version: "1.25"
            node-version: "20"
            task: common-binary
            artifact: Slack-windows-amd64
            output: build/bin/Slack.exe
            goos: windows
            goarch: amd64
          - name: linux-amd64
            runs-on: ubuntu-latest
            go-version: "1.25"
            node-version: "20"
            task: common-binary
            artifact: Slack-linux-amd64
            output: build/bin/Slack
            goos: linux
            goarch: amd64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: startsWith(matrix.runs-on, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Wails environment
        run: wails3 doctor

      - name: Build macOS package
        if: startsWith(matrix.runs-on, 'macos')
        run: wails3 task ${{ matrix.task }}

      - name: Generate bindings
        if: matrix.task == 'common-binary'
        run: wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=-w -ldflags=-s" -clean=true -ts

      - name: Build frontend
        if: matrix.task == 'common-binary'
        working-directory: frontend
        run: npm run build

      - name: Build desktop binary
        if: matrix.task == 'common-binary'
        shell: bash
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 \
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o ${{ matrix.output }}

      - name: Upload macOS artifacts
        if: startsWith(matrix.runs-on, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/**
          if-no-files-found: error

      - name: Upload binary artifacts
        if: matrix.task == 'common-binary'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}
          if-no-files-found: error
