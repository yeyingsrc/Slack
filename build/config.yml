version: '3'

info:
  companyName: "qiwentaidi"
  productName: "Slack"
  productIdentifier: "com.qiwentaidi.slack"
  description: "Slack desktop application"
  copyright: "Copyright © 2026 qiwentaidi"
  comments: "Slack desktop application"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build
      type: blocking
    - cmd: wails3 task run
      type: primary

fileAssociations: []
